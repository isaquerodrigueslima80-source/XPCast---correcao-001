<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GR Games</title>

    <link rel="stylesheet" href="../css/loja.css">
</head>
<body>

    <div class="container">

        <header>
            <h1>Loja GR Games</h1>
            <p>Os melhores jogos para você</p>
        </header>

        <main>

            <section class="produtos">

                <div class="card">
                    <img src="../img/call-of-duty.jpg" alt="COD Black Ops II">

                    <h3>COD Black Ops II</h3>

                    <p>R$ 80,99</p>

                    <button>Comprar</button>
                </div>


                <div class="card">
                    <img src="../img/arc-raiders.jpg" alt="Arc Raiders">

                    <h3>Arc Raiders</h3>

                    <p>R$ 100,99</p>

                    <button>Comprar</button>
                </div>


                <div class="card">
                    <img src="../img/dmc5.jpg" alt="DMC 5">

                    <h3>DMC 5</h3>

                    <p>R$ 99,99</p>

                    <button>Comprar</button>
                </div>


                <div class="card">
                    <img src="../img/eafc26.jpg" alt="EA FC 26">

                    <h3>EA FC 26</h3>

                    <p>R$ 299,99</p>

                    <button>Comprar</button>
                </div>


                <div class="card">
                    <img src="../img/cod6.jpg" alt="COD Black Ops 6">

                    <h3>COD Black Ops 6</h3>

                    <p>R$ 235,50</p>

                    <button>Comprar</button>
                </div>

            </section>

        </main>

    </div>

</body>
</html>
